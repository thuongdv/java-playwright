# ─────────────────────────────────────────────
# Default test configuration
# Override individual keys in environment-specific
# files (e.g. config/staging.properties)
# ─────────────────────────────────────────────

# Browser: chrome | chromium | edge
browser=chrome

# Run in headless mode
headless=true

# Viewport
viewport.width=1280
viewport.height=720

# Timeouts (ms)
timeout.default=30000
timeout.navigation=60000

# Base URL under test
base.url=https://demo.testarchitect.com

# Screenshots on failure: true | false
screenshot.on.failure=true

# Video recording: off | on | retain-on-failure
video.mode=retain-on-failure

# Trace: off | on | retain-on-failure
trace.mode=retain-on-failure

# Output directory for reports, screenshots, videos
output.dir=target/test-output
